name: Feature Request
description: Suggest a new feature, Orchestrator version, or database contract.
title: '[Feature] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Shine. Every idea brings us closer to a fairer, more resilient music platform.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area does this feature affect?
      options:
        - Future Orchestrator (vNext)
        - New Database Contract
        - Existing Contract Enhancement
        - Tooling / Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the gap or pain point. Keep it real and specific.
      placeholder: Artists currently cannot... Users struggle to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What do you propose?
      description: Explain the feature in plain language. If you have a technical sketch, share it.
      placeholder: Add a new contract that... Modify Orchestrator to...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact on artists and listeners
      description: How does this help the people who use Shine?
      placeholder: This lets artists... This makes it easier for listeners to...
    validations:
      required: true

  - type: textarea
    id: gas
    attributes:
      label: Gas considerations
      description: If this touches core logic, how does it affect gas costs?
      placeholder: Adds one SSTORE per transaction... Reduces calls by batching...
    validations:
      required: false

  - type: checkboxes
    id: willing
    attributes:
      label: Are you willing to work on this?
      options:
        - label: I am willing to submit a PR for this feature
          required: false
        - label: I have reviewed the existing contracts and this does not duplicate current functionality
          required: false

  - type: textarea
    id: disclosure
    attributes:
      label: AI Tool Disclosure (Required)
      description: |
        Transparency is mandatory. For every AI tool you used to create or refine this issue, state:
        - **Tool name** (e.g., ChatGPT, Claude, Copilot, Cursor)
        - **Model version** (e.g., GPT-4, Claude 3.5 Sonnet)
        - **Specific purpose** (e.g., "Drafted the proposal text", "Analyzed gas costs of the suggested approach", "Generated the contract sketch", "Grammar checking only")
        
        If you did not use any AI tools, write **"None"**.
        
        Any issue found to contain undisclosed AI-generated content will be closed and disregarded.
      placeholder: |
        Example:
        - ChatGPT-4o: Used to draft the initial proposal text and structure.
        - Claude 3.5 Sonnet: Used to analyze potential gas implications of the new database design.
        
        Or:
        None
    validations:
      required: true
